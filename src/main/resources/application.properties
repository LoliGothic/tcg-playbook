# =====================================================================
# Duel Matrix 基本設定（全プロファイル共通で読み込まれる）
# =====================================================================

spring.application.name=duel-matrix

# --- H2 Database（インメモリ） ---
# DB_CLOSE_DELAY=-1 は，接続が一時的に切れてもインメモリ DB を保持するための指定．
spring.datasource.url=jdbc:h2:mem:duelmatrix;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
# スキーマは schema.sql で明示的に作成するため，Hibernate による自動生成は無効にする．
spring.jpa.hibernate.ddl-auto=none
# ビュー描画中の遅延ロードによる想定外の DB アクセスを避ける．
spring.jpa.open-in-view=false

# --- SQL 初期化（schema.sql -> data.sql の順で実行） ---
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# --- H2 コンソール（DB の中身をブラウザで確認する用） ---
# http://localhost:8080/h2-console で開ける（JDBC URL は上記 datasource.url を入力）．
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
