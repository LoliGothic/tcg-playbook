# =====================================================================
# Docker 実行時の追加設定（プロファイル: docker）
# ---------------------------------------------------------------------
# docker-compose.yml で SPRING_PROFILES_ACTIVE=docker を指定しているため，
# このファイルが application.properties に上書き・追加される形で読み込まれる．
# =====================================================================

# コンテナ外（ホストのブラウザ）から H2 コンソールへ接続できるようにする．
# 通常，H2 コンソールは localhost 以外からのアクセスを拒否するため，Docker では明示的に許可する．
spring.h2.console.settings.web-allow-others=true
